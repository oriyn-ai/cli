version: 2
builds:
  - binary: oriyn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
archives:
  - format: binary
    name_template: "oriyn-{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
