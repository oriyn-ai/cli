name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun x biome check .
      - run: bunx tsc --noEmit
      - run: bun test
      - name: Build npm bundle
        run: bun build src/index.ts --target=bun --format=esm --outfile=dist/index.js --minify
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Cross-compile binaries
        env:
          ORIYN_VERSION: ${{ github.ref_name }}
          ORIYN_COMMIT: ${{ github.sha }}
        run: bun run scripts/build-binaries.ts
      - name: Compute checksums
        run: |
          cd dist/bin
          shasum -a 256 oriyn-* > checksums.txt
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/oriyn-*
            dist/bin/checksums.txt
