name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun run verify-release-tag
      - uses: actions/setup-node@v6
        with:
          # 'lts/*' = current Node LTS, which ships current npm. Trusted
          # Publishers needs npm 11.5+; LTS 24+ has it. Use '*' instead if
          # you want the absolute newest Node (including non-LTS).
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun test
      - name: Build npm bundle
        run: bun run build
      - name: Publish to npm via OIDC trusted publishing
        run: npm publish --provenance --access public

  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun run verify-release-tag
      - run: bun install --frozen-lockfile
      - name: Cross-compile binaries
        env:
          ORIYN_VERSION: ${{ github.ref_name }}
          ORIYN_COMMIT: ${{ github.sha }}
        run: bun run scripts/build-binaries.ts
      - name: Compute checksums
        run: |
          cd dist/bin
          shasum -a 256 oriyn-* > checksums.txt
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/bin/oriyn-*
            dist/bin/checksums.txt
