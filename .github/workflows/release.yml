name: Release

# Two trigger paths:
#   1. push to main  → release-please maintains the "release PR". When that PR
#                      is merged, release-please creates a v* tag, which in
#                      turn triggers goreleaser in the same run.
#   2. push of v* tag → direct release path (hotfixes, manual cuts). Skips
#                       release-please; goreleaser builds and publishes.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  pull-requests: write

# Serialize release runs so two concurrent merges to main don't race on the
# same release PR. We do NOT cancel in-progress — a release in flight should
# finish before the next one starts.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

  goreleaser:
    needs: [release-please]
    # Run if (a) a tag was pushed directly, or (b) release-please just created
    # a release on main. always() bypasses the default "skipped needs → skip"
    # behavior so the tag-push path still works when release-please is skipped.
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
