name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x biome check .
      - run: bunx tsc --noEmit
      - run: bun test
      - run: bun build src/index.ts --target=bun --format=esm --outfile=dist/index.js --minify
