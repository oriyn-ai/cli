name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when the same branch/PR is pushed again. Saves CI
# minutes and keeps the "latest run" signal meaningful.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: format check
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          make fmt-check

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...
