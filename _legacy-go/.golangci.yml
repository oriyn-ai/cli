version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errorlint
    - gosec
    - copyloopvar

  settings:
    gosec:
      excludes:
        - G304
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - gosec
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/oriyn-ai/cli
